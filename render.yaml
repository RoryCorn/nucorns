services:
  - type: web
    name: nucorns
    runtime: node
    plan: starter
    buildCommand: npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: CLIENT_ORIGIN
        value: https://nucorns.com
      - key: DATA_DIR
        value: /var/data/db
      - key: UPLOAD_DIR
        value: /var/data/uploads
      - key: SESSION_SECRET
        generateValue: true
      - key: ANTHROPIC_API_KEY
        sync: false
    disk:
      name: nucorns-data
      mountPath: /var/data
      sizeGB: 1
